<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIDS Login | Secure Terminal</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2.5'><path d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #171717;
            --sidebar-bg: #111111;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --accent-green: #2A7252;
            --accent-glow: rgba(42, 114, 82, 0.2);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px 40px;
            width: 380px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: #064e3b;
            border-radius: 14px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--accent-green);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: white;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s;
        }
 
        input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 15px var(--accent-glow);
            background: rgba(0, 0, 0, 0.5);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-green);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(42, 114, 82, 0.2);
        }
 
        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(42, 114, 82, 0.3);
        }
 
        button:active {
            transform: translateY(0);
        }

        /* Custom Checkbox */
        .custom-checkbox {
            position: relative;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .custom-checkbox input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 18px;
            width: 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            transition: all 0.2s;
        }

        .custom-checkbox:hover input ~ .checkmark {
            border-color: var(--accent-green);
        }

        .custom-checkbox input:checked ~ .checkmark {
            background: var(--accent-green);
            border-color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 4px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .custom-checkbox input:checked ~ .checkmark:after {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <h1>NIDS Terminal</h1>
        <p>Enter Master Password to access Secure Dashboard</p>
        
        {% if error %}
        <div style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 14px; border-radius: 10px; margin-bottom: 28px; font-size: 13px; border: 1px solid rgba(239, 68, 68, 0.2); display: flex; align-items: center; gap: 10px; font-weight: 500;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required autofocus>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Admin Password" required>
            </div>
            <div style="display: flex; align-items: center; justify-content: start; gap: 10px; margin-bottom: 32px; color: var(--text-secondary); font-size: 14px;">
                <label class="custom-checkbox">
                    <input type="checkbox" name="remember" id="remember">
                    <span class="checkmark"></span>
                </label>
                <label for="remember" style="cursor:pointer; user-select: none;">Remember me on this device</label>
            </div>
            <button type="submit">Unlock System</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const userField = document.querySelector('input[name="username"]');
            const passField = document.querySelector('input[name="password"]');
            const rememberBox = document.getElementById('remember');
            const form = document.querySelector('form');

            if (localStorage.getItem('nids_remember') === 'true') {
                userField.value = localStorage.getItem('nids_username') || 'admin_nids';
                passField.value = localStorage.getItem('nids_password') || '';
                rememberBox.checked = true;
            } else {
                userField.value = 'admin_nids'; // Default
            }

            form.addEventListener('submit', function() {
                if (rememberBox.checked) {
                    localStorage.setItem('nids_remember', 'true');
                    localStorage.setItem('nids_username', userField.value);
                    localStorage.setItem('nids_password', passField.value);
                } else {
                    localStorage.removeItem('nids_remember');
                    localStorage.removeItem('nids_username');
                    localStorage.removeItem('nids_password');
                }
            });
        });
    </script>
</body>
</html>
